# access-controller configuration — the edge app. It watches the policy KV
# bucket into in-memory maps, decides credential presentations locally with the
# pure policy.Decide function, and publishes access events to JetStream.
#
# Loaded via the -config flag (default: config/controller.yaml). Every key can
# be overridden by an SA_-prefixed env var, e.g. SA_CONTROLLER_LOCATION=hq.
#
# Run with:  access-controller -config config/controller.yaml

# ----------------------------------------------------------------------------
# NATS — must point at the SAME broker/account as accessd so this controller
# sees the ACC_POLICY bucket accessd writes and can publish to ACC_EVENTS.
# ----------------------------------------------------------------------------
nats:
  urls:
    - "tls://nats.example.com:4222"

  # Provision a SEPARATE NATS identity for each controller on the platform
  # (least privilege: a controller only needs to watch ACC_POLICY, publish
  # acc.{location}.{type}.{thing}.evt.> and subscribe to the matching
  # acc.*.cmd/acc.*.tap subjects). Save its creds file outside the repo
  # (*.creds is gitignored).
  credsFile: "config/controller.creds"
  #   nkeySeedFile: "config/controller.nk"
  #   token: "${SA_NATS_TOKEN}"
  #   username: "controller-hq"
  #   password: "${SA_NATS_PASSWORD}"

  tls:
    enable: false
    # caFile: "config/ca.pem"
    # certFile: "config/client.pem"
    # keyFile: "config/client.key"
    insecure: false

  maxReconnects: -1
  reconnectWait: 250ms

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
logging:
  level: info
  encoding: json
  outputPath: stdout

# ----------------------------------------------------------------------------
# Metrics — distinct port from accessd so both can run on one host during dev.
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  address: ":2114"
  path: "/metrics"
  updateInterval: 15s

# ----------------------------------------------------------------------------
# Policy KV — same bucket accessd publishes to.
# ----------------------------------------------------------------------------
policy:
  bucket: "ACC_POLICY"

# ----------------------------------------------------------------------------
# Subjects — the app-discriminator segment for all NATS subjects. MUST match
# accessd's subjects.app (and every other controller's), or this controller
# won't see policy/commands or land its events in the audit stream. Single
# NATS token.
# ----------------------------------------------------------------------------
subjects:
  app: "acc"

# ----------------------------------------------------------------------------
# Controller identity. `code` must match a `controllers` record in accessd; this
# box arms readers/locks for the portals whose `controller` relation points at
# it (which doors it drives, and their relay/input bindings, live in policy, not
# here). `location` selects the timezone and scopes the command/fire subscriptions.
# ----------------------------------------------------------------------------
controller:
  code: "ctrl-hq-1"
  location: "hq"
  # Liveness heartbeat cadence. The controller publishes to
  # acc.{location}.ctrl.{code}.heartbeat (core NATS, outside the audit stream) so
  # accessd can show this box online/offline. Grant this subject in the
  # controller's NATS publish permissions alongside the evt.> portal events.
  heartbeatInterval: 15s

  # Portal hardware backend:
  #   mock — simulated (default). No physical I/O: taps arrive over NATS and there
  #          is no door monitoring. Use for dev or a logical-only controller.
  #   gpio — drive real relays and DPS/REX inputs via the Linux GPIO character
  #          device. Requires `model` below. Linux/arm64 edge hardware only.
  driver: "mock"
  # Hardware model — selects the GPIO profile mapping a portal's logical relay/
  # input indices to physical lines. Required when driver is "gpio"; must match a
  # registered model (kincony-server-mini | kincony-pi5r8) and the controllers
  # record. Relay/input wiring polarity is encoded in the profile, not here.
  # model: "kincony-server-mini"
