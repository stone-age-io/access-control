# access-controller configuration — the edge app. It watches the policy KV
# bucket into in-memory maps, decides credential presentations locally with the
# pure policy.Decide function, and publishes access events to JetStream.
#
# Loaded via the -config flag (default: config/controller.yaml). Every key can
# be overridden by an SA_-prefixed env var, e.g. SA_CONTROLLER_LOCATION=hq.
#
# Run with:  access-controller -config config/controller.yaml

# ----------------------------------------------------------------------------
# NATS — must point at the SAME broker/account as accessd so this controller
# sees the ACC_POLICY bucket accessd writes and can publish to ACC_EVENTS.
# ----------------------------------------------------------------------------
nats:
  urls:
    - "tls://nats.example.com:4222"

  # Provision a SEPARATE NATS identity for each controller on the platform
  # (least privilege: a controller only needs to watch ACC_POLICY, publish
  # acc.{location}.{type}.{thing}.evt.> and subscribe to the matching
  # acc.*.cmd/acc.*.tap subjects). Save its creds file outside the repo
  # (*.creds is gitignored).
  credsFile: "config/controller.creds"
  #   nkeySeedFile: "config/controller.nk"
  #   token: "${SA_NATS_TOKEN}"
  #   username: "controller-hq"
  #   password: "${SA_NATS_PASSWORD}"

  tls:
    enable: false
    # caFile: "config/ca.pem"
    # certFile: "config/client.pem"
    # keyFile: "config/client.key"
    insecure: false

  maxReconnects: -1
  reconnectWait: 250ms

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
logging:
  level: info
  encoding: json
  outputPath: stdout

# ----------------------------------------------------------------------------
# Metrics — distinct port from accessd so both can run on one host during dev.
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  address: ":2114"
  path: "/metrics"
  updateInterval: 15s

# ----------------------------------------------------------------------------
# Diagnostics — an OPT-IN, read-only local status page for field install and
# troubleshooting. Serves /status (HTML, auto-refreshing) and /status.json with
# this box's live state: identity, NATS/policy-sync health, the portals it bound
# and their door/posture state, and recent decisions. It is read-only — all
# control stays on the NATS command plane. Disabled by default. The page reveals
# topology (portal codes, locations, reader addresses), so `address` defaults to
# localhost; reach it via SSH/tunnel rather than binding a public interface.
# ----------------------------------------------------------------------------
diagnostics:
  enabled: false
  address: "127.0.0.1:2115"

# ----------------------------------------------------------------------------
# Policy KV — same bucket accessd publishes to.
# ----------------------------------------------------------------------------
policy:
  bucket: "ACC_POLICY"

  # Offline config cache (OPT-IN). Persist the last policy graph delivered over KV
  # to a local file so a reboot with NATS unreachable (leaf node down, or no
  # network) still decides on last-known config instead of booting default-deny.
  # When enabled, a missing NATS at startup is no longer fatal — the box binds KV
  # lazily, runs on cache, and converges when the hub returns.
  #
  # Fail-secure: a missing/corrupt snapshot, or one older than maxAge, loads
  # nothing and the box stays default-deny. Live KV always wins once it syncs.
  # maxAge bounds how stale cached config may be to be trusted on an offline boot
  # (zero/unset -> 72h default; a large value like 8760h ~ disables the check).
  # cache:
  #   enabled: true
  #   path: "./data/policy-cache.json"
  #   maxAge: 72h

# ----------------------------------------------------------------------------
# Subjects — the app-discriminator segment for all NATS subjects. MUST match
# accessd's subjects.app (and every other controller's), or this controller
# won't see policy/commands or land its events in the audit stream. Single
# NATS token.
# ----------------------------------------------------------------------------
subjects:
  app: "acc"

# ----------------------------------------------------------------------------
# Controller identity. `code` must match a `controllers` record in accessd; this
# box arms readers/locks for the portals whose `controller` relation points at
# it (which doors it drives, and their relay/input bindings, live in policy, not
# here). `location` selects the timezone and scopes the command/fire subscriptions.
# ----------------------------------------------------------------------------
controller:
  code: "ctrl-hq-1"
  location: "hq"
  # Liveness heartbeat cadence. The controller publishes to
  # acc.{location}.ctrl.{code}.heartbeat (core NATS, outside the audit stream) so
  # accessd can show this box online/offline. Grant this subject in the
  # controller's NATS publish permissions alongside the evt.> portal events.
  heartbeatInterval: 15s

  # Portal hardware backend:
  #   mock — simulated (default). No physical I/O: taps arrive over NATS and there
  #          is no door monitoring. Use for dev or a logical-only controller.
  #   gpio — drive real relays and DPS/REX inputs. The `model` below picks the
  #          physical transport: native GPIO char device (kincony-server-mini) or
  #          an MCP23017 I2C expander (kincony-pi5r8). Requires `model`. Linux only.
  driver: "mock"
  # Hardware model — selects the profile mapping a portal's logical relay/input
  # indices to physical lines AND the transport (GPIO vs I2C), and the RS485 serial
  # port for the OSDP reader. Required when driver is "gpio" OR reader is "osdp";
  # must match a registered model (kincony-server-mini | kincony-pi5r8) and the
  # controllers record. Relay/input wiring polarity is in the profile, not here.
  # model: "kincony-server-mini"

  # Credential reader (independent of the lock/door driver above):
  #   nats — simulated (default). Taps arrive by publishing
  #          {app}.{location}.{type}.{thing}.tap; drive it with `nats pub` for dev.
  #   osdp — a real OSDP reader polled on the model's RS485 bus (e.g. /dev/ttyAMA2
  #          on the Pi5R8). Requires `model`. The lock strike and DPS/REX stay on
  #          the GPIO/I2C driver above. Each portal's PD address on the bus is its
  #          `reader_address` field in policy (default 0 — the single-reader case).
  reader: "nats"
