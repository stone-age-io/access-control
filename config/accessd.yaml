# accessd configuration — the central stone-access app (PocketBase control
# plane + KV mirror publisher + JetStream audit consumer).
#
# Loaded from $SA_CONFIG (default: config/accessd.yaml). Every key can be
# overridden by an SA_-prefixed env var, e.g.:
#   SA_NATS_URLS=nats://prod:4222   SA_NATS_CREDSFILE=/etc/accessd/svc.creds
# A missing file is fine — defaults + env vars still apply.
#
# Run with:  accessd serve            (PocketBase owns the HTTP address via
#                                       --http; default 127.0.0.1:8090)

# ----------------------------------------------------------------------------
# NATS — the data plane. accessd writes policy to the KV bucket and consumes
# the audit stream. Point this at your remote broker.
# ----------------------------------------------------------------------------
nats:
  # One or more server URLs (comma-separated via SA_NATS_URLS). For TLS use
  # the tls:// scheme or set tls.enable below.
  urls:
    - "nats://nats.example.com:4222"

  # --- Authentication: pick exactly ONE method (or none for an open dev box). ---
  #
  # Stone-Age.io issues per-identity NATS credentials (JWT + nkey seed) as a
  # .creds file — the recommended path for a backend service. Provision a NATS
  # user for accessd on the platform, save its creds file outside the repo
  # (anything matching *.creds is gitignored), and reference it here:
  credsFile: "config/example.creds"
  #
  # Alternatives (leave credsFile empty if you use one of these):
  #   nkeySeedFile: "config/accessd.nk"   # raw nkey seed file
  #   token: "${SA_NATS_TOKEN}"           # bearer token
  #   username: "accessd"                 # user/password
  #   password: "${SA_NATS_PASSWORD}"

  # --- TLS. Not needed when the URL scheme is tls:// and the server presents a
  # publicly-trusted cert. Enable for mutual TLS or a custom CA. ---
  tls:
    enable: false
    # caFile: "config/ca.pem"        # custom CA to verify the server
    # certFile: "config/client.pem"  # client cert (mutual TLS) — with keyFile
    # keyFile: "config/client.key"
    insecure: false                  # NEVER true in production

  # Reconnect forever with a short backoff; the KV watcher re-arms on reconnect.
  maxReconnects: -1
  reconnectWait: 250ms

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
logging:
  level: info          # debug | info | warn | error
  encoding: json       # json | console
  outputPath: stdout

# ----------------------------------------------------------------------------
# Metrics — Prometheus endpoint
# ----------------------------------------------------------------------------
metrics:
  enabled: true
  address: ":2113"
  path: "/metrics"
  updateInterval: 15s

# ----------------------------------------------------------------------------
# Policy KV — the bucket accessd mirrors the policy graph into, one key per
# record (cred.{value}, user.{id}, role.{code}, ...). Controllers watch it.
# ----------------------------------------------------------------------------
policy:
  bucket: "ACC_POLICY"

# ----------------------------------------------------------------------------
# Events — the JetStream audit stream the controllers publish to and accessd
# consumes into the PocketBase events collection. The stream's subject set is
# derived from the {app}.*.…evt subtree (see subjects.app below), not set here.
# ----------------------------------------------------------------------------
events:
  stream: "ACC_EVENTS"

# ----------------------------------------------------------------------------
# Subjects — the app-discriminator segment every NATS subject leads with
# ({app}.{location}.{type}.{thing}.tap/.cmd/.evt …). accessd and EVERY
# controller must use the same app token. Change it only to isolate a deployment
# on a shared NATS account. Must be a single NATS token (no '.', '*', '>', or
# whitespace).
# ----------------------------------------------------------------------------
subjects:
  app: "acc"

# ----------------------------------------------------------------------------
# accessd-specific
# ----------------------------------------------------------------------------
accessd:
  # Embedded PocketBase data directory (database + uploads). Created at runtime;
  # gitignored. The management UI is //go:embed-ed into the binary (from
  # internal/webui/public), not served from disk — there is no pb_public.
  dataDir: "./pb_data"
  # How long without a heartbeat before a controller is shown offline. accessd
  # subscribes to acc.*.ctrl.*.heartbeat (core NATS) and updates the controllers
  # record directly. Keep this a few controller heartbeatIntervals so one dropped
  # heartbeat does not flap a box offline.
  controllerOfflineAfter: 45s
  # How long to keep control-plane audit rows (audit_logs — who changed which
  # policy record, written by internal/changelog) before a daily 03:00 prune
  # deletes them. Unset (0) = 365 days; set negative to keep forever.
  auditRetentionDays: 365
  # How long to keep door-activity rows (events — the rebuildable projection of
  # the ACC_EVENTS JetStream stream) before a daily 03:00 prune deletes them.
  # Defaults to 0 = keep forever (opt-in); JetStream stays the system of record,
  # so a prune only shrinks the read model. Set a positive day count to trim it.
  eventRetentionDays: 0
